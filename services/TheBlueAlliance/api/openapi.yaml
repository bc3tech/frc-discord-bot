components:
  parameters:
    If-None-Match:
      description: Value of the `ETag` header in the most recently cached response
        by the client.
      explode: false
      in: header
      name: If-None-Match
      required: false
      schema:
        type: string
      style: simple
    district_abbreviation:
      description: "District abbreviation, eg `ne` or `fim`"
      explode: false
      in: path
      name: district_abbreviation
      required: true
      schema:
        type: string
      style: simple
    district_key:
      description: "TBA District Key, eg `2016fim`"
      explode: false
      in: path
      name: district_key
      required: true
      schema:
        type: string
      style: simple
    event_key:
      description: "TBA Event Key, eg `2016nytr`"
      explode: false
      in: path
      name: event_key
      required: true
      schema:
        type: string
      style: simple
    match_key:
      description: "TBA Match Key, eg `2016nytr_qm1`"
      explode: false
      in: path
      name: match_key
      required: true
      schema:
        type: string
      style: simple
    media_tag:
      description: Media Tag which describes the Media.
      explode: false
      in: path
      name: media_tag
      required: true
      schema:
        type: string
      style: simple
    page_num:
      description: "Page number of results to return, zero-indexed"
      explode: false
      in: path
      name: page_num
      required: true
      schema:
        type: integer
      style: simple
    team_key:
      description: "TBA Team Key, eg `frc254`"
      explode: false
      in: path
      name: team_key
      required: true
      schema:
        type: string
      style: simple
    year:
      description: Competition Year (or Season). Must be 4 digits.
      explode: false
      in: path
      name: year
      required: true
      schema:
        type: integer
      style: simple
  responses:
    Unauthorized:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/inline_object"
      description: Authorization information is missing or invalid.
    NotFound:
      description: Not Found
    NotModified:
      description: Not Modified - Use Local Cached Value
  schemas:
    API_Status:
      example:
        is_datafeed_down: true
        down_events:
        - down_events
        - down_events
        max_season: 6
        max_team_page: 5
        current_season: 0
        android:
          min_app_version: 1
          latest_app_version: 5
        ios:
          min_app_version: 1
          latest_app_version: 5
      properties:
        current_season:
          description: Year of the current FRC season.
          type: integer
        max_season:
          description: Maximum FRC season year for valid queries.
          type: integer
        is_datafeed_down:
          description: True if the entire FMS API provided by FIRST is down.
          type: boolean
        down_events:
          description: An array of strings containing event keys of any active events
            that are no longer updating.
          items:
            type: string
          type: array
        ios:
          $ref: "#/components/schemas/API_Status_App_Version"
        android:
          $ref: "#/components/schemas/API_Status_App_Version"
        max_team_page:
          description: Maximum team page number for valid queries.
          type: integer
      required:
      - android
      - current_season
      - down_events
      - ios
      - is_datafeed_down
      - max_season
      - max_team_page
    API_Status_App_Version:
      example:
        min_app_version: 1
        latest_app_version: 5
      properties:
        min_app_version:
          description: Internal use - Minimum application version required to correctly
            connect and process data.
          type: integer
        latest_app_version:
          description: Internal use - Latest application version available.
          type: integer
      required:
      - latest_app_version
      - min_app_version
    AutoChargeStationRobot_2023:
      enum:
      - Docked
      - None
      type: string
    AutoLineRobot_2024:
      enum:
      - "No"
      - "Yes"
      type: string
    AutoRobot_2018:
      enum:
      - None
      - AutoRun
      type: string
    Award:
      example:
        year: 6
        name: name
        recipient_list:
        - awardee: awardee
          team_key: team_key
        - awardee: awardee
          team_key: team_key
        award_type: 0
