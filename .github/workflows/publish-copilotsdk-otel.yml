name: Publish CopilotSdk.OpenTelemetry

on:
  push:
    tags:
      - 'copilotsdk-otel-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'NuGet package version (e.g. 0.1.0)'
        required: true
        type: string

jobs:
  publish:
    name: Pack and Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Compute version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            # Strip leading "copilotsdk-otel-v" from tag ref
            TAG="${GITHUB_REF##*/}"
            echo "value=${TAG#copilotsdk-otel-v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore
        run: dotnet restore lib/CopilotSdk.OpenTelemetry/CopilotSdk.OpenTelemetry.csproj

      - name: Build
        run: dotnet build lib/CopilotSdk.OpenTelemetry/CopilotSdk.OpenTelemetry.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/CopilotSdk.OpenTelemetry.Tests/CopilotSdk.OpenTelemetry.Tests.csproj --configuration Release

      - name: Pack
        run: >-
          dotnet pack lib/CopilotSdk.OpenTelemetry/CopilotSdk.OpenTelemetry.csproj
          --configuration Release
          --no-build
          -p:PackageVersion=${{ steps.version.outputs.value }}
          -o ${{ github.workspace }}/artifacts

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: CopilotSdk.OpenTelemetry-${{ steps.version.outputs.value }}
          path: ${{ github.workspace }}/artifacts/*.nupkg

      - name: Push to NuGet.org
        if: ${{ env.NUGET_API_KEY != '' }}
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: >-
          dotnet nuget push ${{ github.workspace }}/artifacts/*.nupkg
          --api-key "$NUGET_API_KEY"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
